<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code 案例指南</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4.12.2/lib/themes/vue.css">
  <style>
    .sidebar-nav > ul > li > a { font-weight: bold; color: #2c3e50; }
    .content { max-width: 900px; }
  </style>
</head>
<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: 'Claude Code 案例指南',
      repo: 'https://github.com/kankedelangzi/claude-code-book',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        paths: 'auto',
        placeholder: '🔍 搜索',
        noData: '没有找到结果',
        depth: 3
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.12.2/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2.6.1/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-search@4.12.2/dist/search.min.js"></script>
</body>
</html>
